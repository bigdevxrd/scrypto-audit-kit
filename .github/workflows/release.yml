name: release

# Publish to PyPI when a GitHub Release is published. Uses PyPI Trusted Publishing
# (OIDC) — no API token, no secret to rotate. One-time setup + the cut-a-release
# steps are in RELEASING.md.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scrypto-audit-kit
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify the release tag matches VERSION
        run: |
          want="v$(cat VERSION)"
          got="${{ github.event.release.tag_name }}"
          if [ "$want" != "$got" ]; then
            echo "::error::release tag '$got' does not match VERSION ('$want') — bump VERSION or fix the tag."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
